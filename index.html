<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FCE1E7;
    --rule: #ED7491;
    --rule-soft: #F3B0C0;
    --text: #ED7491;
    --text-deep: #E8819A;
    --box-border: #ED7491;
    --check: #ED7491;
    --deco: #F6BCCB;
    --deco-soft: #F8CDD8;
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }

  body{
    background: var(--bg);
    font-family: 'Quicksand', sans-serif;
    color: var(--text);
    min-height: 100vh;
  }

  .page{
    max-width: 700px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--bg);
    padding: 60px 56px 90px;
    position: relative;
    overflow: hidden;
  }

  /* ---------- decorations (real artwork, positioned to match the original layout) ---------- */
  .deco{ position:absolute; pointer-events:none; z-index:0; user-select:none; }
  .deco-bow{ top: 14px; right: 168px; width: 92px; height:auto; }
  .deco-flower{ top: 230px; right: -36px; width: 168px; height:auto; }
  .deco-bunny{ bottom: 86px; right: 8px; width: 132px; height:auto; }
  .deco-butterfly{ bottom: -6px; left: -14px; width: 122px; height:auto; }

  /* ---------- header ---------- */
  header{
    position: relative;
    z-index: 1;
    display:flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 36px;
  }

  h1{
    font-family: 'Cormorant', serif;
    font-weight: 300;
    font-size: 52px;
    line-height: 1.04;
    letter-spacing: 1px;
    margin: 0;
    color: var(--text);
  }

  .week-days{
    font-family: 'Cormorant', serif;
    font-weight: 400;
    font-size: 19px;
    letter-spacing: 3px;
    text-align: right;
    line-height: 1.9;
    margin-top: 4px;
    user-select: none;
  }

  .week-days .row{ display:flex; gap: 10px; justify-content: flex-end; }

  .day-label{
    cursor: pointer;
    position: relative;
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: color 0.15s ease, background 0.15s ease;
  }
  .day-label:hover{ color: var(--text-deep); }

  .day-label.selected{
    color: var(--text-deep);
    background: rgba(237, 116, 145, 0.10);
  }
  .day-label.selected::after{
    content:'';
    position:absolute;
    inset: 0;
    border: 1.4px solid var(--rule);
    border-radius: 50%;
    pointer-events:none;
  }

  .today-dot::before{
    content:'';
    position:absolute;
    left: 50%;
    bottom: 1px;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--rule);
    transform: translateX(-50%);
  }

  .date-line{
    font-family: 'Quicksand', sans-serif;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--text-deep);
    margin-top: 10px;
    text-align: right;
  }

  .reset-btn{
    display: block;
    margin: 8px 0 0 auto;
    border: none;
    background: transparent;
    font-family: 'Quicksand', sans-serif;
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: 0.4px;
    color: var(--rule-soft);
    text-decoration: underline;
    text-decoration-color: var(--rule-soft);
    text-underline-offset: 2px;
    cursor: pointer;
    padding: 2px 0;
    transition: color 0.15s ease, text-decoration-color 0.15s ease;
  }
  .reset-btn:hover{
    color: var(--rule);
    text-decoration-color: var(--rule);
  }

  /* ---------- main two-col section ---------- */
  .columns{
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 1.35fr 1fr;
    column-gap: 36px;
  }

  .col-divider{
    border-left: 1.4px solid var(--rule);
    padding-left: 36px;
  }

  .section-title{
    font-family: 'Cormorant', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 26px;
    color: var(--text);
    margin: 0 0 4px;
  }

  .section-rule{
    border: none;
    border-top: 1.6px solid var(--rule);
    margin: 0 0 18px;
  }

  .item-row{
    display:flex;
    align-items: center;
    gap: 12px;
    padding-bottom: 9px;
  }

  .checkbox{
    width: 17px; height: 17px;
    border: 1.6px solid var(--box-border);
    border-radius: 4px;
    flex-shrink: 0;
    cursor: pointer;
    background: transparent;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-top: 2px;
  }
  .checkbox svg{
    width: 11px; height: 11px;
    opacity: 0;
  }
  .checkbox.checked svg{ opacity: 1; }

  .item-line{
    flex: 1;
    border-bottom: 1.2px solid var(--rule-soft);
    padding-bottom: 6px;
  }

  .item-text{
    width: 100%;
    border: none;
    background: transparent;
    font-family: 'Quicksand', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--text-deep);
    outline: none;
    padding: 0;
  }
  .item-text::placeholder{ color: var(--rule-soft); font-weight: 500; }

  .item-row.done .item-text{
    text-decoration: line-through;
    text-decoration-color: var(--rule-soft);
    opacity: 0.65;
  }

  .remove-btn{
    border:none;
    background:transparent;
    color: var(--rule-soft);
    font-size: 13px;
    cursor: pointer;
    opacity: 0;
    flex-shrink: 0;
    width: 16px;
    transition: opacity 0.15s ease;
  }
  .item-row:hover .remove-btn{ opacity: 1; }

  .add-row{ margin-top: 2px; }
  .add-row .checkbox{ border-style: dashed; }

  .notes-block{ margin-top: 30px; }

  .notes-lines{ display:flex; flex-direction:column; gap: 19px; }

  textarea.notes-input{
    width: 100%;
    border: none;
    background: transparent;
    resize: none;
    font-family: 'Quicksand', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--text-deep);
    outline: none;
    line-height: 31px;
    padding: 0;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 29px,
      var(--rule-soft) 29px,
      var(--rule-soft) 30.2px
    );
  }

  .save-pill{
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--rule);
    color: #FCE1E7;
    font-size: 12px;
    font-weight: 700;
    padding: 8px 15px;
    border-radius: 999px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.25s ease, transform 0.25s ease;
    pointer-events: none;
    z-index: 5;
    display:flex;
    align-items:center;
    gap: 6px;
  }
  .save-pill.show{ opacity: 1; transform: translateY(0); }
  .save-pill svg{ width: 12px; height: 12px; }

  @media (max-width: 620px){
    .page{ padding: 40px 24px 70px; }
    h1{ font-size: 38px; }
    .columns{ grid-template-columns: 1fr; row-gap: 30px; }
    .col-divider{ border-left:none; border-top: 1.4px solid var(--rule); padding-left:0; padding-top: 26px; }
    .deco-flower, .deco-bunny{ opacity: 0.5; }
    .week-days{ text-align:left; }
    .week-days .row{ justify-content:flex-start; }
    .date-line{ text-align:left; }
    header{ flex-direction: column; gap: 18px; }
  }

  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
</style>
</head>

  <header>
    <div>
      <h1>DAILY<br>PLANNER</h1>
      <div class="date-line" id="dateLine">—</div>
      <button class="reset-btn" id="resetBtn" type="button">Reset this day</button>
    </div>
    <div class="week-days" id="weekDays">
      <div class="row" id="rowTop"></div>
      <div class="row" id="rowBottom"></div>
    </div>
  </header>

  <div class="columns">
    <!-- TO DO LIST -->
    <div class="col">
      <h2 class="section-title">To Do List</h2>
      <hr class="section-rule">
      <div id="todoList"></div>
      <div class="item-row add-row">
        <div class="checkbox" aria-hidden="true"></div>
        <div class="item-line">
          <input class="item-text" id="todoInput" placeholder="Add a task and press Enter…" maxlength="120">
        </div>
      </div>
    </div>

    <!-- PRIORITIES + NOTES -->
    <div class="col col-divider">
      <h2 class="section-title">Priorities</h2>
      <hr class="section-rule">
      <div id="prioList"></div>
      <div class="item-row add-row">
        <div class="checkbox" aria-hidden="true"></div>
        <div class="item-line">
          <input class="item-text" id="prioInput" placeholder="Add a priority…" maxlength="120">
        </div>
      </div>

      <div class="notes-block">
        <h2 class="section-title">Notes</h2>
        <hr class="section-rule">
        <textarea class="notes-input" id="notesArea" rows="9" placeholder="Jot anything down…"></textarea>
      </div>
    </div>
  </div>

</div>

</div>

<script>
(function(){
  const STORAGE_KEY = 'dailyPlannerData_v1';
  const DAY_LABELS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const MONTH_LABELS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const FULL_DAY = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  function todayISO(){
    const d = new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }

  function loadData(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return { days: {} };
      const parsed = JSON.parse(raw);
      if(!parsed.days) parsed.days = {};
      return parsed;
    }catch(e){
      return { days: {} };
    }
  }

  function saveData(data){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      flashSaved();
    }catch(e){
      console.error('Could not save planner data', e);
    }
  }

  let saveTimer = null;
  function flashSaved(){
    const pill = document.getElementById('savePill');
    pill.classList.add('show');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(()=> pill.classList.remove('show'), 1300);
  }

  let data = loadData();
  let selectedDate = todayISO();

  function ensureDay(dateKey){
    if(!data.days[dateKey]){
      data.days[dateKey] = { todos: [], priorities: [], notes: '' };
    }
    return data.days[dateKey];
  }

  function uid(){
    return 'id'+Math.random().toString(36).slice(2,10);
  }

  /* ---------- Week-day labels (two rows of the current week, matching reference) ---------- */
  function renderWeekDays(){
    const rowTop = document.getElementById('rowTop');
    const rowBottom = document.getElementById('rowBottom');
    rowTop.innerHTML = '';
    rowBottom.innerHTML = '';

    const today = new Date();
    const sunday = new Date(today);
    sunday.setDate(today.getDate() - today.getDay());

    for(let i=0;i<7;i++){
      const d = new Date(sunday);
      d.setDate(sunday.getDate()+i);
      const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');

      const span = document.createElement('span');
      span.className = 'day-label';
      span.textContent = DAY_LABELS[i];
      span.dataset.date = key;
      if(key === todayISO()) span.classList.add('today-dot');
      if(key === selectedDate) span.classList.add('selected');

      span.addEventListener('click', ()=>{
        selectedDate = key;
        renderWeekDays();
        renderAll();
      });

      if(i < 4) rowTop.appendChild(span);
      else rowBottom.appendChild(span);
    }

    const sel = new Date(selectedDate+'T00:00:00');
    document.getElementById('dateLine').textContent =
      `${FULL_DAY[sel.getDay()]}, ${MONTH_LABELS[sel.getMonth()]} ${sel.getDate()}`;
  }

  /* ---------- Checkmark icon ---------- */
  const checkSVG = `<svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#ED7491" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  /* ---------- Render a list (todos or priorities) ---------- */
  function renderList(listKey, containerId, inputId){
    const day = ensureDay(selectedDate);
    const container = document.getElementById(containerId);
    container.innerHTML = '';

    const items = day[listKey];

    items.forEach(item=>{
      const row = document.createElement('div');
      row.className = 'item-row' + (item.done ? ' done' : '');

      const box = document.createElement('div');
      box.className = 'checkbox' + (item.done ? ' checked' : '');
      box.innerHTML = checkSVG;
      box.addEventListener('click', ()=>{
        item.done = !item.done;
        saveData(data);
        renderList(listKey, containerId, inputId);
      });

      const line = document.createElement('div');
      line.className = 'item-line';

      const text = document.createElement('input');
      text.className = 'item-text';
      text.value = item.text;
      text.placeholder = 'Untitled';
      text.addEventListener('input', ()=>{
        item.text = text.value;
        saveData(data);
      });
      text.addEventListener('keydown', (e)=>{
        if(e.key === 'Enter') text.blur();
      });
      line.appendChild(text);

      const remove = document.createElement('button');
      remove.className = 'remove-btn';
      remove.innerHTML = '✕';
      remove.title = 'Remove';
      remove.addEventListener('click', ()=>{
        const idx = items.indexOf(item);
        if(idx > -1) items.splice(idx,1);
        saveData(data);
        renderList(listKey, containerId, inputId);
      });

      row.appendChild(box);
      row.appendChild(line);
      row.appendChild(remove);
      container.appendChild(row);
    });
  }

  function setupAddInput(inputId, listKey, containerId){
    const input = document.getElementById(inputId);
    input.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter' && input.value.trim() !== ''){
        const day = ensureDay(selectedDate);
        day[listKey].push({ id: uid(), text: input.value.trim(), done: false });
        input.value = '';
        saveData(data);
        renderList(listKey, containerId, inputId);
      }
    });
  }

  function renderNotes(){
    const day = ensureDay(selectedDate);
    const area = document.getElementById('notesArea');
    area.value = day.notes || '';
  }

  function setupNotes(){
    const area = document.getElementById('notesArea');
    let debounce = null;
    area.addEventListener('input', ()=>{
      const day = ensureDay(selectedDate);
      day.notes = area.value;
      clearTimeout(debounce);
      debounce = setTimeout(()=> saveData(data), 400);
    });
  }

  function setupReset(){
    const btn = document.getElementById('resetBtn');
    btn.addEventListener('click', ()=>{
      const sel = new Date(selectedDate+'T00:00:00');
      const label = `${FULL_DAY[sel.getDay()]}, ${MONTH_LABELS[sel.getMonth()]} ${sel.getDate()}`;
      const confirmed = window.confirm(`Clear all tasks, priorities, and notes for ${label}? This can't be undone.`);
      if(!confirmed) return;
      data.days[selectedDate] = { todos: [], priorities: [], notes: '' };
      saveData(data);
      renderAll();
    });
  }

  function renderAll(){
    renderList('todos', 'todoList', 'todoInput');
    renderList('priorities', 'prioList', 'prioInput');
    renderNotes();
  }

  setupAddInput('todoInput', 'todos', 'todoList');
  setupAddInput('prioInput', 'priorities', 'prioList');
  setupNotes();
  setupReset();

  renderWeekDays();
  renderAll();
})();
</script>

</body>
</html>
